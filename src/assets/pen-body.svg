<svg width="40" height="200" viewBox="0 0 40 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pen Body (Matte Graphite) -->
  <path d="M5 40C5 30 10 25 20 25C30 25 35 30 35 40V180C35 190 30 195 20 195C10 195 5 190 5 180V40Z" fill="#2A2A2A"/>
  <rect x="5" y="40" width="30" height="140" fill="url(#bodyGradient)"/>
  
  <!-- Section (Grip) -->
  <path d="M8 25C8 20 12 15 20 15C28 15 32 20 32 25V40H8V25Z" fill="#1A1A1A"/>
  
  <!-- Metallic Nib -->
  <path d="M20 0C14 0 10 8 10 12C10 16 14 20 20 20C26 20 30 16 30 12C30 8 26 0 20 0Z" fill="url(#nibGradient)"/>
  <path d="M20 0V8" stroke="#333" stroke-width="0.5"/> <!-- Slit -->
